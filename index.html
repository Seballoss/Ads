<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="utf-8">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.3/jquery.min.js"></script>
    <script type="javascript"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        #caption {
            position: fixed;
            font-size: 20px;
            line-height: 30px;
            height: 120px;
            width: 100%;
            white-space: nowrap;
            -moz-animation: caption 50s linear 0s infinite;
            -webkit-animation: caption 50s linear 0s infinite;
        }

        @-moz-keyframes caption {
            0% {
                margin-left: 100%;
            }

            100% {
                margin-left: -2450px;
            }
        }

        @-webkit-keyframes caption {
            0% {
                margin-left: 100%;
            }

            100% {
                margin-left: -2450px;
            }
        }

        html,
        body {
            margin: 0;
            padding: 0;
        }

        body {
            height: 100%;
            overflow: hidden;
            font-size: 26px;
            font-family: Lucida Sans Unicode;
        }

        #pictures {
            min-height: 100%;
            width: 1920px;
            height: 960px;
        }

        #pictures img {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;

            width: 1920px;
            height: 960px;
            opacity: 0;
            transition: opacity 1s;
        }

        #pictures img.current {
            opacity: 1;
            width: 1920px;
            height: 960px;

        }

        #stopka {
            width: 1920px;
            height: 120px;
            position: absolute;
            z-index: 2;
            background-color: #cbae52;
            color: #1B1A39;
        }

        .one-column {
            float: left;
            width: 500px;
            background-color: #1B1A39;

            border-style: solid;
            border-radius: 25px;
            color: whitesmoke;
            line-height: 40px;

        .two-column {

    </style>
</head>

<body>
   <script>
    document.addEventListener("DOMContentLoaded", function () {
        var container = document.querySelector("#pictures");
        var pictures = [].slice.call(container.querySelectorAll("img"));
        var currentIndex = 0; 

        function change() {
            var current = container.querySelector("img.current");
            if (current) {
                current.classList.remove("current");
            }

            var next = pictures[currentIndex];
            if (next) {
                next.classList.add("current");
            }

            var nextInterval = next.getAttribute("src") === "informacja.jpg" ? 60000 : 8000;
            currentIndex = (currentIndex + 1) % pictures.length;
            setTimeout(change, nextInterval);
        }
        change();
    }, false);
</script>

    <div id="pictures"></div>
</body>
